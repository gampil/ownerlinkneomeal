<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan | Link Neo Meal</title>
    
    <!-- PWA Meta Tags (Opsional, agar selaras dengan PWA) -->
    <meta name="theme-color" content="#059669">
    
    <!-- Tailwind & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Animasi Mengambang Kustom */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .bg-pattern {
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-[#f4f7f6] text-gray-800 font-sans h-screen flex items-center justify-center relative overflow-hidden bg-pattern">

    <!-- Ornamen Lingkaran Latar Belakang -->
    <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

    <!-- Kontainer Utama 404 -->
    <div class="bg-white/80 backdrop-blur-xl rounded-[2rem] w-full max-w-md p-10 text-center shadow-[0_20px_50px_rgba(5,150,105,0.1)] relative z-10 mx-5 border border-white">
        
        <!-- Ikon Sayur/Mangkuk Melayang -->
        <div class="relative w-40 h-40 mx-auto mb-6 animate-float flex items-center justify-center">
            <!-- Bayangan di bawah ikon -->
            <div class="absolute bottom-0 w-24 h-4 bg-gray-200 rounded-[50%] blur-sm opacity-60" style="bottom: -10px;"></div>
            
            <div class="relative z-10 bg-emerald-50 w-32 h-32 rounded-full border-[6px] border-white shadow-xl flex items-center justify-center text-emerald-500">
                <i class="fa-solid fa-map-location-dot text-6xl"></i>
            </div>
            
            <!-- Ornamen tanda tanya kecil -->
            <div class="absolute top-2 right-2 bg-amber-400 text-white w-10 h-10 rounded-full flex items-center justify-center font-black text-xl shadow-lg border-4 border-white transform rotate-12">
                ?
            </div>
        </div>

        <!-- Teks Informasi -->
        <h1 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-500 mb-2">404</h1>
        <h2 class="text-xl font-bold text-gray-800 mb-3">Waduh, Kesasar Ya?</h2>
        <p class="text-sm text-gray-500 font-medium mb-8 leading-relaxed">
            Halaman yang kamu cari sepertinya sudah dihabiskan pelanggan atau alamat URL-nya salah ketik.
        </p>

        <!-- Tombol Aksi -->
        <a href="index.html" class="inline-flex w-full items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-6 rounded-2xl text-sm transition-all shadow-[0_8px_20px_rgba(5,150,105,0.3)] hover:shadow-[0_10px_25px_rgba(5,150,105,0.4)] hover:-translate-y-1 active:scale-95 group">
            <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
            Kembali ke Kasir
        </a>
    </div>

</body>
</html>
